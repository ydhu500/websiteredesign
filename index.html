<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek - Redesign</title>
    <style>
      
    </style>
</head>
<body>

    <!-- Redesigned Left Navigation / Sidebar History -->
    <aside>
        <div style="display: flex; flex-direction: column; flex: 1;">
            <div class="logo-section">
                <div class="logo-dot"></div>
                <span>deepseek</span>
            </div>
            
            <button class="new-chat-btn">
                <span>+</span> New Chat
            </button>

            <div class="history-list">
                <div class="history-item active">Redesign Layout Ideas</div>
                <div class="history-item">CSS Grid vs Flexbox guide</div>
                <div class="history-item">Data Structures implementation</div>
                <div class="history-item">IoT Project VoltCare Proposal</div>
            </div>
        </div>
        
        <div class="history-item" style="border-top: 1px solid var(--border-color); padding-top: 1rem;">
            ⚙️ Settings
        </div>
    </aside>

    <!-- Core Chat Window Area -->
    <main>
        <header>
            <div></div>
            <select class="model-selector">
                <option>DeepSeek-V3 (Chat)</option>
                <option>DeepSeek-R1 (Reasoning)</option>
            </select>
            <div></div>
        </header>

        <div class="chat-container">
            <h1 class="hero-title">How can I help you design today?</h1>
            
            <!-- Context Capsule Area -->
            <div class="input-wrapper">
                <textarea placeholder="Ask me anything... Use Shift + Enter for new lines"></textarea>
                
                <div class="input-actions">
                    <div class="action-left">
                        <button class="icon-btn">📎 Attach</button>
                        <button class="icon-btn">🌐 Deep Think</button>
                        <button class="icon-btn">🔍 Web Search</button>
                    </div>
                    <button class="submit-btn">➔</button>
                </div>
            </div>

            <!-- Contextual Quick Action Cards -->
            <div class="suggestions-grid">
                <button class="suggestion-card">
                    <strong>Refactor UI Layout</strong><br>
                    Optimize clean CSS glassmorphism styles.
                </button>
                <button class="suggestion-card">
                    <strong>Code Review</strong><br>
                    Debug pointers and recursive loops.
                </button>
                <button class="suggestion-card">
                    <strong>Analyze IoT Specs</strong><br>
                    Review real-time sensory power systems.
                </button>
            </div>
        </div>
    </main>

</body>
</html>
